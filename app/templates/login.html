<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Car Cost Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-950 flex items-center justify-center">
  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-3xl mx-auto mb-4">🚗</div>
      <h1 class="text-2xl font-bold text-white">Car Cost Tracker</h1>
      <p class="text-slate-500 text-sm mt-1">Enter your password to continue</p>
    </div>
    <div class="bg-slate-800 border border-slate-700/60 rounded-2xl p-7 shadow-2xl">
      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-5">
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" id="password" name="password" autofocus required placeholder="••••••••••"
            class="w-full bg-slate-700 border border-slate-600 text-white placeholder-slate-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
