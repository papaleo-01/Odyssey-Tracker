{% extends "base.html" %}
{% block title %}{% if entry %}Edit{% else %}Add{% endif %} Maintenance — {{ app_title }}{% endblock %}
{% block content %}
<div class="mb-6">
  <a href="/log?type=maintenance" class="text-sm text-blue-400 hover:text-blue-300">← Back to Log</a>
  <h1 class="text-xl font-bold text-white mt-2">{% if entry %}Edit Service Record{% else %}Add Service Record{% endif %}</h1>
</div>
<div class="max-w-lg">
  <div class="card">
    <form method="post" action="{% if entry %}/maintenance/{{ entry.id }}/edit{% else %}/maintenance/add{% endif %}" class="space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="form-label">Date <span class="text-red-400">*</span></label>
          <input type="date" name="date" required value="{{ entry.date.isoformat() if entry else today.isoformat() }}" class="form-input"/></div>
        <div><label class="form-label">Category</label>
          <select name="category" class="form-select">
            {% for cat in categories %}<option value="{{ cat }}" {% if entry and entry.category == cat %}selected{% endif %}>{{ cat }}</option>{% endfor %}
          </select></div>
      </div>
      <div><label class="form-label">Description <span class="text-red-400">*</span></label>
        <input type="text" name="description" required placeholder="e.g. Oil change, Tire rotation…" value="{{ entry.description if entry else '' }}" class="form-input"/></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="form-label">Cost <span class="text-red-400">*</span></label>
          <div class="relative"><span class="absolute left-3 top-2.5 text-slate-400 text-xs">{{ currency }}</span><input type="number" name="cost" required min="0" step="0.01" placeholder="120.00" value="{{ entry.cost if entry else '' }}" class="form-input pl-6"/></div></div>
        <div><label class="form-label">Odometer (km)</label>
          <div class="relative"><input type="number" name="odometer" min="0" step="0.1" placeholder="{{ last_odometer }}" value="{{ entry.odometer if entry and entry.odometer else '' }}" class="form-input pr-10"/><span class="absolute right-3 top-2.5 text-slate-400 text-xs">km</span></div></div>
      </div>
      <div><label class="form-label">Shop / Garage</label>
        <input type="text" name="shop" placeholder="BMW Service, local garage…" value="{{ entry.shop if entry and entry.shop else '' }}" class="form-input"/></div>
      <div><label class="form-label">Notes</label>
        <textarea name="notes" rows="2" placeholder="Parts replaced, warranty info…" class="form-input">{{ entry.notes if entry and entry.notes else '' }}</textarea></div>
      <div class="flex gap-3 pt-1">
        <button type="submit" class="btn-primary">{% if entry %}Save Changes{% else %}Add Service Record{% endif %}</button>
        <a href="/log?type=maintenance" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
